<body>

  <main class="wrap reading video-main">
    <div class="title-block">

      <h2 class="video-heading">Écouter l'œuvre</h2>

      <div class="audio-box">
        <audio controls preload="metadata" aria-label="Lecture intégrale de l'œuvre">
          <source src="https://github.com/malainho/malainho.github.io/releases/download/audio/fr.mp3" type="audio/mpeg">

        <p class="audio-dl"><a href="https://github.com/malainho/malainho.github.io/releases/download/audio/fr.mp3" download>Télécharger l'audio (MP3)</a></p>
      </div>

      <p class="video-back"><a href="../lagrandedecouverte/">← Retour au texte</a></p>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <p>César Manuel Malainho de Oliveira</p>
    </div>
  </footer>

  <script>
  function __toggleTheme(){var r=document.documentElement;var c=r.getAttribute('data-theme');var d;if(c==='dark'){d=true;}else if(c==='light'){d=false;}else{d=window.matchMedia('(prefers-color-scheme: dark)').matches;}var n=d?'light':'dark';r.setAttribute('data-theme',n);try{localStorage.setItem('theme',n);}catch(e){}}
  </script>
