<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto — A Grande Descoberta</title>
  <meta name="description" content="Entre em contacto com o autor de A Grande Descoberta: envie uma mensagem ou faça uma pergunta sobre a obra.">
  <meta name="author" content="César Manuel Malainho de Oliveira">
  <link rel="canonical" href="https://malainho.github.io/contacto-pt/">
  <link rel="alternate" hreflang="pt" href="https://malainho.github.io/contacto-pt/">
  <link rel="alternate" hreflang="en" href="https://malainho.github.io/contacto-en/">
  <link rel="alternate" hreflang="fr" href="https://malainho.github.io/contacto-fr/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contacto — A Grande Descoberta">
  <meta property="og:description" content="Entre em contacto com o autor de A Grande Descoberta: envie uma mensagem ou faça uma pergunta sobre a obra.">
  <meta property="og:locale" content="pt_PT">
  <link rel="stylesheet" href="../style.css">
  <script>
    (function(){try{var t=localStorage.getItem('theme');if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
  </script>
</head>
<body>
  <header class="masthead">
    <div class="wrap">
      <a class="home" href="../">A Grande Descoberta</a>
      <div class="right">
        <nav class="langbar" aria-label="Language">
          <a class="active" href="#" aria-current="page">PT</a>
        <a href="../contacto-en/" hreflang="en">EN</a>
        <a href="../contacto-fr/" hreflang="fr">FR</a>
        </nav>
        <button class="theme-toggle" type="button" onclick="__toggleTheme()" aria-label="Alternar tema claro/escuro" title="Alternar tema claro/escuro">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="wrap reading">
    <div class="title-block">
      <p class="eyebrow">César Manuel Malainho de Oliveira</p>
      <h1>Contacto</h1>
      <hr class="title-rule">
    </div>

    <p class="intro contact-intro">Tem uma pergunta sobre a obra, ou simplesmente algo a dizer-me? Escreva-me — responderei ao e-mail que indicar no formulário.</p>

    <p class="contact-cta">
      <a class="contact-btn" href="https://forms.gle/Jam7FSbJMf95xa6NA" target="_blank" rel="noopener">Escrever mensagem →</a>
    </p>
    <p class="contact-note">O formulário abre num novo separador.</p>
  </main>

  <footer>
    <div class="wrap">
      <p>César Manuel Malainho de Oliveira</p>
    </div>
  </footer>
  <script>
  function __toggleTheme(){var r=document.documentElement;var c=r.getAttribute('data-theme');var d;if(c==='dark'){d=true;}else if(c==='light'){d=false;}else{d=window.matchMedia('(prefers-color-scheme: dark)').matches;}var n=d?'light':'dark';r.setAttribute('data-theme',n);try{localStorage.setItem('theme',n);}catch(e){}}
  </script>
</body>
</html>
