<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Great Discovery — Audio</title>
  <meta name="description" content="Listen to the full reading of The Great Discovery, a dialogue between two friends with completely different views on life.">
  <meta name="author" content="César Manuel Malainho de Oliveira">
  <link rel="canonical" href="https://malainho.github.io/audio-en/">
  <link rel="alternate" hreflang="en" href="https://malainho.github.io/audio-en/">
  <link rel="alternate" hreflang="pt" href="https://malainho.github.io/audio-pt/">
  <link rel="alternate" hreflang="fr" href="https://malainho.github.io/audio-fr/">
  <meta property="og:type" content="music.song">
  <meta property="og:title" content="The Great Discovery — Audio">
  <meta property="og:description" content="Listen to the full reading of The Great Discovery, a dialogue between two friends with completely different views on life.">
  <meta property="og:locale" content="en">
  <link rel="stylesheet" href="../style.css">
  <script>
    (function(){try{var t=localStorage.getItem('theme');if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
  </script>
</head>
<body>
  <header class="masthead">
    <div class="wrap">
      <a class="home" href="../">The Great Discovery</a>
      <div class="right">
        <nav class="langbar" aria-label="Language">
          <a class="active" href="#" aria-current="page">EN</a>
        <a href="../audio-pt/" hreflang="pt">PT</a>
        <a href="../audio-fr/" hreflang="fr">FR</a>
        </nav>
        <a class="icon-btn" href="../thegreatdiscovery/" aria-label="Read the work" title="Read the work">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </a>
        <a class="icon-btn" href="../links/" aria-label="External links" title="External links">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="theme-toggle" type="button" onclick="__toggleTheme()" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="wrap reading video-main">
    <div class="title-block">
      <p class="eyebrow">César Manuel Malainho de Oliveira</p>
      <h1>The Great Discovery</h1>
      <p class="edition">2nd Edition</p>
      <hr class="title-rule">
    </div>

    <section class="video-section" aria-label="Listen to the work">
      <h2 class="video-heading">Listen to the work</h2>
      <p class="video-sub">The work read aloud. · 1 h 28 min</p>

      <div class="audio-box">
        <audio controls preload="metadata" aria-label="Full reading of the work">
          <source src="https://github.com/malainho/malainho.github.io/releases/download/audio/en.mp3" type="audio/mpeg">
        </audio>
        <p class="audio-dl"><a href="https://github.com/malainho/malainho.github.io/releases/download/audio/en.mp3" download>Download the audio (MP3)</a></p>
      </div>

      <p class="video-back"><a href="../thegreatdiscovery/">← Back to the text</a></p>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <p>César Manuel Malainho de Oliveira</p>
    </div>
  </footer>

  <script>
  function __toggleTheme(){var r=document.documentElement;var c=r.getAttribute('data-theme');var d;if(c==='dark'){d=true;}else if(c==='light'){d=false;}else{d=window.matchMedia('(prefers-color-scheme: dark)').matches;}var n=d?'light':'dark';r.setAttribute('data-theme',n);try{localStorage.setItem('theme',n);}catch(e){}}
  </script>
</body>
</html>
