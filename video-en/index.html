<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Great Discovery — Listen to the work</title>
  <meta name="description" content="The Great Discovery in video — the work read aloud, in English.">
  <meta name="author" content="César Manuel Malainho de Oliveira">
  <link rel="canonical" href="https://malainho.github.io/video-en/">
  <link rel="alternate" hreflang="en" href="https://malainho.github.io/video-en/">
  <link rel="alternate" hreflang="pt" href="https://malainho.github.io/video-pt/">
  <link rel="alternate" hreflang="fr" href="https://malainho.github.io/video-fr/">
  <link rel="stylesheet" href="../style.css">
  <script>
    (function(){try{var t=localStorage.getItem('theme');if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
  </script>
</head>
<body>
  <header class="masthead">
    <div class="wrap">
      <a class="home" href="../">The Great Discovery</a>
      <div class="right">
        <nav class="langbar" aria-label="Language">
          <a class="active" href="#" aria-current="page">EN</a>
          <a href="../video-pt/" hreflang="pt">PT</a>
          <a href="../video-fr/" hreflang="fr">FR</a>
        </nav>
        <a class="icon-btn" href="../thegreatdiscovery/" aria-label="← Back to the text" title="← Back to the text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </a>
        <button class="theme-toggle" type="button" onclick="__toggleTheme()" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="wrap video-main">
    <div class="title-block">
      <p class="eyebrow">César Manuel Malainho de Oliveira</p>
      <h1>The Great Discovery</h1>
      <p class="edition">2nd Edition</p>
      <hr class="title-rule">
    </div>

    <section class="video-section" aria-label="Listen to the work">
      <h2 class="video-heading">Listen to the work</h2>
      <p class="video-sub">The work read aloud. Press play to listen.</p>

      <div class="video-frame">
        <div class="video-facade" data-yt="oOZSDCgGyr0" role="button" tabindex="0"
             aria-label="Play the video"
             onclick="__loadVideo(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();__loadVideo(this);}"
             style="background-image:url('https://i.ytimg.com/vi/oOZSDCgGyr0/hqdefault.jpg')">
          <span class="video-play" aria-hidden="true">
            <svg viewBox="0 0 68 48"><path class="pl-bg" d="M66.5 7.7c-.8-2.9-2.5-5.4-5.4-6.2C55.8.1 34 0 34 0S12.2.1 6.9 1.5C4 2.3 2.3 4.8 1.5 7.7.1 13 0 24 0 24s.1 11 1.5 16.3c.8 2.9 2.5 5.4 5.4 6.2C12.2 47.9 34 48 34 48s21.8-.1 27.1-1.5c2.9-.8 4.6-3.3 5.4-6.2C67.9 35 68 24 68 24s-.1-11-1.5-16.3z"/><path class="pl-tri" d="M45 24 27 14v20z" fill="#fff"/></svg>
          </span>
        </div>
      </div>

      <p class="video-back"><a href="../thegreatdiscovery/">← Back to the text</a></p>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <p>César Manuel Malainho de Oliveira</p>
    </div>
  </footer>

  <script>
  function __toggleTheme(){var r=document.documentElement;var c=r.getAttribute('data-theme');var d;if(c==='dark'){d=true;}else if(c==='light'){d=false;}else{d=window.matchMedia('(prefers-color-scheme: dark)').matches;}var n=d?'light':'dark';r.setAttribute('data-theme',n);try{localStorage.setItem('theme',n);}catch(e){}}
  function __loadVideo(el){var id=el.getAttribute('data-yt');var f=document.createElement('iframe');f.setAttribute('src','https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&rel=0');f.setAttribute('title','The Great Discovery');f.setAttribute('frameborder','0');f.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');f.setAttribute('allowfullscreen','');f.className='video-iframe';el.parentNode.replaceChild(f,el);}
  </script>
</body>
</html>
